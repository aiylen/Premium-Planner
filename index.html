<!DOCTYPE html>
<html lang="en" data-theme="violet" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Planner — Premium Digital Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/themes.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="app-shell">
  <div class="sidebar-scrim" id="sidebarScrim"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Mini Planner<span>Premium Edition</span></div>
    </div>

    <div class="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search sections...">
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="sidebar-foot">
      <button class="nav-item" id="resetBtn" title="Reset demo data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
        <span>Reset demo data</span>
      </button>
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-meta">
          <strong id="userName">Asad</strong>
          <span id="userSub">Demo account</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="icon-btn" id="menuToggle" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="topbar-title">
          <h1 id="viewTitle">Dashboard</h1>
          <p id="viewSub">Your day at a glance</p>
        </div>
      </div>
      <div class="topbar-actions">
        <span id="clock" class="muted" style="font-size:12px;color:var(--text-dim);margin-right:6px;white-space:nowrap;"></span>
        <div class="theme-dots">
          <span class="theme-dot" data-c="violet"></span>
          <span class="theme-dot" data-c="green"></span>
          <span class="theme-dot" data-c="blue"></span>
          <span class="theme-dot" data-c="pink"></span>
          <span class="theme-dot" data-c="orange"></span>
        </div>
        <button class="icon-btn" id="modeToggle" title="Toggle dark mode"></button>
        <button class="icon-btn no-print" id="printBtn" title="Print / Export PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>
        </button>
      </div>
    </header>

    <div class="view" id="viewRoot"></div>
  </main>
</div>

<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="modalBackdrop"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/views/charts.js"></script>
<script src="assets/js/views/dashboard.js"></script>
<script src="assets/js/views/daily.js"></script>
<script src="assets/js/views/weekly.js"></script>
<script src="assets/js/views/monthly.js"></script>
<script src="assets/js/views/goals.js"></script>
<script src="assets/js/views/habits.js"></script>
<script src="assets/js/views/finance.js"></script>
<script src="assets/js/views/meals.js"></script>
<script src="assets/js/views/water.js"></script>
<script src="assets/js/views/selfcare.js"></script>
<script src="assets/js/views/notes.js"></script>
</body>
</html>
